[phases.setup]
nixPkgs = ["bun", "curl", "bash"]

[phases.install]
cmds = [
  "bun install --frozen-lockfile",
  "curl -sSL https://raw.githubusercontent.com/okx/onchainos-skills/main/install.sh | sh",
  "cp /root/.local/bin/onchainos /usr/local/bin/onchainos || true"
]

[start]
cmd = "PATH=/root/.local/bin:/usr/local/bin:$PATH bun run src/index.ts"
