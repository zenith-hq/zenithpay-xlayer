[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[rpc_endpoints]
xlayer = "${XLAYER_RPC_URL}"

[etherscan]
xlayer = { key = "${OKLINK_API_KEY}", url = "https://www.oklink.com/api/v5/explorer/contract/verify-source-code-plugin/XLAYER" }
